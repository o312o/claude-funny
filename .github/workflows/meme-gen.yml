name: Auto Generate Memes

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      max_memes:
        description: 'Max new memes to generate'
        default: '5'
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate new memes
        id: gen
        env:
          OLLAMA_ENDPOINT: ${{ secrets.OLLAMA_ENDPOINT }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL || 'hermes' }}
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
          MAX_NEW_MEMES: ${{ inputs.max_memes || '5' }}
        run: python scripts/generate_memes.py

      - name: Commit and push
        if: steps.gen.outputs.added != '0'
        run: |
          git config user.name "Claude Meme Bot"
          git config user.email "meme-bot@users.noreply.github.com"
          git add claude-memes/memes.json claude-memes/references.jsonl
          git diff --staged --quiet && exit 0
          ADDED="${{ steps.gen.outputs.added }}"
          TOTAL="${{ steps.gen.outputs.total }}"
          REFS="${{ steps.gen.outputs.references }}"
          git commit -m "🎭 Auto-generate ${ADDED} new memes (total: ${TOTAL})

          - ${ADDED} new AI-generated memes added
          - ${REFS} Reddit references found
          - Generated by GitHub Actions + AI pipeline"
          git push
