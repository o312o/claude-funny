<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Funny — Bot Please</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+Thai:wght@400;600;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0f0f1a;--card:#1a1a2e;--accent:#e94560;--claude:#d4764e;--text:#e8e8f0;--dim:#8888aa;--border:#2a2a4a}
  body{background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans Thai',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}

  .bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% 40%,rgba(233,69,96,0.06) 0%,transparent 70%)}

  .hero{text-align:center;margin-bottom:50px}
  .logo{font-size:clamp(2rem,8vw,4rem);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--claude),#ffd32a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:10px}
  .tagline{color:var(--dim);font-size:clamp(0.85rem,2.5vw,1.1rem);max-width:500px;margin:0 auto}

  .cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:700px;width:100%}

  .card{flex:1;min-width:260px;max-width:320px;background:var(--card);border:2px solid var(--border);border-radius:20px;padding:36px 28px;text-decoration:none;color:var(--text);transition:all 0.3s;position:relative;overflow:hidden;cursor:pointer}
  .card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s}
  .card:hover{transform:translateY(-6px);border-color:var(--accent-card)}
  .card:hover::before{opacity:1}
  .card:active{transform:translateY(-2px) scale(0.99)}

  .card-meme{--accent-card:#e94560}
  .card-meme::before{background:radial-gradient(ellipse at top,rgba(233,69,96,0.08) 0%,transparent 70%)}
  .card-meme:hover{box-shadow:0 12px 40px rgba(233,69,96,0.2)}

  .card-popcat{--accent-card:#ffd32a}
  .card-popcat::before{background:radial-gradient(ellipse at top,rgba(255,211,42,0.08) 0%,transparent 70%)}
  .card-popcat:hover{border-color:#ffd32a;box-shadow:0 12px 40px rgba(255,211,42,0.15)}

  .card-icon{font-size:3.5rem;margin-bottom:16px;display:block}
  .card-title{font-size:1.4rem;font-weight:900;margin-bottom:8px}
  .card-meme .card-title{background:linear-gradient(135deg,var(--accent),var(--claude));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .card-popcat .card-title{background:linear-gradient(135deg,#ffd32a,#ff9f43);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .card-desc{color:var(--dim);font-size:0.88rem;line-height:1.6;margin-bottom:20px}
  .card-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:0.78rem;font-weight:700;border:1px solid;transition:all 0.2s}
  .card-meme .card-badge{border-color:rgba(233,69,96,0.4);color:var(--accent);background:rgba(233,69,96,0.08)}
  .card-popcat .card-badge{border-color:rgba(255,211,42,0.4);color:#ffd32a;background:rgba(255,211,42,0.08)}
  .card:hover .card-badge{padding-right:18px}

  .footer{margin-top:50px;text-align:center;color:var(--dim);font-size:0.75rem}
  .footer a{color:var(--claude);text-decoration:none}

  @media(max-width:480px){.cards{flex-direction:column;align-items:center}.card{min-width:0;width:100%;max-width:100%}}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="hero">
  <div class="logo">Claude Funny</div>
  <p class="tagline">รวมความบันเทิงของ Claude user ในที่เดียว 🐱</p>
</div>

<div class="cards">
  <a class="card card-meme" href="/claude-memes/">
    <span class="card-icon">😂</span>
    <div class="card-title">Claude Memes</div>
    <p class="card-desc">มีมจากปัญหาจริงของผู้ใช้ Claude ทุกระดับ — Free, Pro, Max, Code<br>100+ meme อัปเดตโดย AI</p>
    <span class="card-badge">เปิดดู meme →</span>
  </a>

  <a class="card card-popcat" href="/popcat/">
    <span class="card-icon">🐱</span>
    <div class="card-title">PopCat</div>
    <p class="card-desc">กดแมวให้ได้คะแนนสูงสุด<br>เกมกดปุ่มง่ายๆ แก้เบื่อขณะรอ rate limit</p>
    <span class="card-badge">เล่นเลย →</span>
  </a>
</div>

<div class="footer">
  <p>by <a href="https://www.facebook.com/profile.php?id=61576077000830" target="_blank">Bot Please</a> • <a href="https://www.tiktok.com/@botplease.me" target="_blank">TikTok</a></p>
</div>

</body>
</html>
